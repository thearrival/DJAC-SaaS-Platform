<head>

  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />

  <link rel="canonical" href="https://app.yalla-hack.ae/" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />

  <meta property="og:description"
    content="Enterprise compliance platform for China–Saudi Arabia cross-border operations and regulatory mapping." />
  <meta property="og:url" content="https://app.yalla-hack.ae/" />
  <meta property="og:image" content="/yalla-hack-logo.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/yalla-hack-logo.png" />
  <link rel="apple-touch-icon" href="/yalla-hack-logo.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DJAC" />

  <!-- Inter font (used throughout the UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <title>DJAC Tool | China-Saudi Compliance SaaS</title>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "DJAC Tool",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://app.yalla-hack.ae/",
      "description": "A compliance SaaS for China-Saudi cross-border legal and regulatory workflows.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
  <!-- React 19 + DevTools compatibility: patch missing performance methods on the
       DevTools global hook (older extension versions don't implement clearMarks /
       clearMeasures which React 19's scheduler tries to call). -->
  <script>
    (function () {
      try {
        // Disable React DevTools entirely in production to prevent older extension
        // versions from interfering with React 19 concurrent rendering.
        // This is the most reliable way to avoid blank-page issues caused by
        // DevTools hooks that are incompatible with React 19.
        if (typeof window.__REACT_DEVTOOLS_GLOBAL_HOOK__ !== 'undefined') {
          window.__REACT_DEVTOOLS_GLOBAL_HOOK__.isDisabled = true;
        }
        // Also guard the global performance object just in case.
        if (typeof performance !== "undefined") {
          if (typeof performance.clearMarks !== "function") performance.clearMarks = function () { };
          if (typeof performance.clearMeasures !== "function") performance.clearMeasures = function () { };
        }
      } catch (_e) { /* non-fatal */ }
    })();
  </script>
  <!-- Visible JS error overlay — shows any crash that prevents React from mounting -->
  <script>
    (function () {
      var _errors = [];
      function showOverlay(msg) {
        var el = document.getElementById('djac-boot-error');
        if (!el) {
          el = document.createElement('div');
          el.id = 'djac-boot-error';
          el.className = 'djac-boot-error-overlay';
          el.innerHTML = '<div class="djac-boot-error-card"><h2 class="djac-boot-error-title">DJAC Startup Error</h2><pre id="djac-boot-error-msg" class="djac-boot-error-msg"></pre></div>';
          document.body.appendChild(el);
        }
        document.getElementById('djac-boot-error-msg').textContent = _errors.join('\n\n');
      }
      window.addEventListener('error', function (e) {
        var msg = (e.error && e.error.stack) ? e.error.stack : (e.message + ' (' + e.filename + ':' + e.lineno + ')');
        _errors.push(msg);
        var root = document.getElementById('djac-app-root');
        if (!root || root.childElementCount === 0) showOverlay(msg);
      });
      window.addEventListener('unhandledrejection', function (e) {
        var msg = (e.reason && e.reason.stack) ? e.reason.stack : String(e.reason);
        _errors.push(msg);
        var root = document.getElementById('djac-app-root');
        if (!root || root.childElementCount === 0) showOverlay(msg);
      });
    })();
  </script>
  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem("theme");
        var themeMode = localStorage.getItem("theme-mode");
        var path = (window.location.pathname || "/").split("?")[0].toLowerCase();
        var lightDefaults = {
          "/": true,
          "/login": true,
          "/signup": true,
          "/forgot-password": true,
          "/reset-password": true,
          "/privacy": true,
          "/terms": true,
          "/pricing": true,
          "/hero": true
        };

        var effectiveTheme = (themeMode === "manual" && (storedTheme === "dark" || storedTheme === "light"))
          ? storedTheme
          : (lightDefaults[path] ? "light" : "dark");

        if (effectiveTheme === "dark") {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        } else {
          document.documentElement.classList.remove("dark");
          document.documentElement.style.colorScheme = "light";
        }
      } catch (_error) {
        // Ignore storage access failures.
      }
    })();
  </script>
  <style>
    .djac-boot-error-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 99999;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: monospace;
    }

    .djac-boot-error-card {
      max-width: 700px;
      background: #fef2f2;
      border: 2px solid #dc2626;
      border-radius: 12px;
      padding: 24px;
    }

    .djac-boot-error-title {
      margin: 0 0 12px;
      color: #dc2626;
      font-size: 18px;
    }

    .djac-boot-error-msg {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 12px;
      color: #111;
      max-height: 400px;
      overflow: auto;
    }

    .djac-noscript-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f3f4f6;
      color: #111827;
      font-family: Inter, Arial, sans-serif;
    }

    .djac-noscript-card {
      max-width: 560px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .djac-noscript-title {
      margin: 0 0 12px;
      font-size: 24px;
      font-weight: 700;
    }

    .djac-noscript-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div id="djac-app-root" data-djac-root="true"></div>
  <noscript>
    <div class="djac-noscript-wrap">
      <div class="djac-noscript-card">
        <h1 class="djac-noscript-title">DJAC requires JavaScript</h1>
        <p class="djac-noscript-text">Please open this page in a modern browser with JavaScript
          enabled so the compliance dashboard can load correctly.</p>
      </div>
    </div>
  </noscript>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
